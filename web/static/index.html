<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOOTBALL — Multi-Competition Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/shared.css">
</head>
<body>
<div class="landing-backdrop" id="landingBackdrop">
  <div class="bd-sky">
    <div class="bd-sky-glow"></div>
    <div class="bd-cloud bd-cloud-1"></div>
    <div class="bd-cloud bd-cloud-2"></div>
  </div>
  <div class="bd-mid">
    <div class="bd-stand bd-stand-left"></div>
    <div class="bd-stand bd-stand-right"></div>
    <div class="bd-floodlight-bar"></div>
    <div class="bd-floodlight-bloom"></div>
    <div class="bd-goal">
      <svg viewBox="0 0 100 80">
        <line x1="5" y1="5" x2="5" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <line x1="95" y1="5" x2="95" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <line x1="5" y1="5" x2="95" y2="5" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
        <rect x="5" y="5" width="90" height="70" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <line x1="5" y1="18" x2="95" y2="18" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <line x1="5" y1="35" x2="95" y2="35" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <line x1="5" y1="55" x2="95" y2="55" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <line x1="18" y1="5" x2="18" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
        <line x1="35" y1="5" x2="35" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
        <line x1="55" y1="5" x2="55" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
        <line x1="75" y1="5" x2="75" y2="75" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
      </svg>
    </div>
    <div class="bd-circle-wrap">
      <div class="bd-circle"></div>
    </div>
  </div>
  <div class="bd-pitch">
    <div class="bd-pitch-field"></div>
  </div>
  <div class="bd-vignette"></div>
</div>
<div id="app">
  <div class="nav-bar" id="navBar"></div>
  <div id="contentArea"></div>
  <div class="status-bar" id="statusBar"></div>
</div>

<input id="terminal-input" type="text" autofocus>

<script type="module" src="static/shared.js"></script>
</body>
</html>
